</script> <script>(function(){const DE_APP_ID = "rJkK3tjsEAAhEgfl";
const DE_APP_SECRET = "04eYYEuUdVlAGrN1";
const DE_BASE_URL = "https://spell-dig-marsh-somewhere.trycloudflare.com/";
const DE_DV_ID = "1247187068585644032";

  function b64url(str) {
    return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  async function generateToken(appId, appSecret, payload) {
    var header = { alg: 'HS256', typ: 'JWT' };
    var headerB64 = b64url(JSON.stringify(header));
    var payloadB64 = b64url(JSON.stringify(payload));
    var data = headerB64 + '.' + payloadB64;
    var encoder = new TextEncoder();
    var key = await crypto.subtle.importKey('raw', encoder.encode(appSecret),
      { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
    var sig = await crypto.subtle.sign('HMAC', key, encoder.encode(data));
    var sigBytes = new Uint8Array(sig);
    var sigChars = [];
    for (var i = 0; i < sigBytes.length; i++) sigChars.push(String.fromCharCode(sigBytes[i]));
    return data + '.' + b64url(sigChars.join(''));
  }

  function waitForBi(maxWait) {
    maxWait = maxWait || 15000;
    return new Promise(function (resolve, reject) {
      var start = Date.now();
      (function check() {
        if (typeof window.DataEaseBi !== 'undefined') return resolve();
        if (Date.now() - start > maxWait) return reject(new Error('SDK 加载超时'));
        setTimeout(check, 200);
      })();
    });
  }

  window.addEventListener('load', function () {
    var loadingEl = document.getElementById('bi-loading');
    var container = document.getElementById('bi-container');

    function done(msg) {
      if (loadingEl) {
        loadingEl.textContent = msg || '✓';
        setTimeout(function () { loadingEl.style.display = 'none'; }, 1500);
      }
    }

    function fail(msg) {
      if (loadingEl) {
        loadingEl.textContent = msg;
        loadingEl.style.background = 'rgba(220,38,38,0.85)';
      }
    }

    waitForBi()
      .then(function () {
        var now = Math.floor(Date.now() / 1000);
        return generateToken(DE_APP_ID, DE_APP_SECRET, {
          uid: 1, oid: 1, appId: DE_APP_ID, account: 'admin', exp: now + 960 * 60
        });
      })
      .then(function (token) {
        var bi = new window.DataEaseBi('Dashboard', {
          baseUrl: DE_BASE_URL,
          token: token,
          dvId: DE_DV_ID,
          busiFlag: 'dashboard'
        });
        bi.initialize({ container: '#bi-container' });
        done('仪表板已加载');
      })
      .catch(function (err) {
        fail('加载失败: ' + (err && err.message || err));
        console.error('DataEase embed error:', err);
      });
  });
})();</script>
